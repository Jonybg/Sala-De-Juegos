<section class="flex flex-col items-center justify-center min-h[100vh] w-4/5 mx-auto mt-[4vh]" >
     <h1 class="text-xl sm:text-2xl md:text-3xl lg:text-4xl font-bold text-center mb-4">Bienvenido {{user()?.nombre}} a <span class="text-(--color-primary)">PixelZone</span> </h1>
     <div class="grid grid-cols-1 md:grid-cols-2 gap-8 w-full px-4 ">
        @for (card of cards; track $index) {
            <app-card-games [card]="card"></app-card-games>
        }
    </div>
</section>
