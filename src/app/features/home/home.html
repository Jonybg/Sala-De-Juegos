<section class="flex flex-col items-center justify-center min-h-[75vh] w-4/5 mx-auto mt-[4vh]">
    
    @if (user()) {
        <h1 class="text-xl sm:text-2xl md:text-3xl lg:text-4xl font-bold text-center mb-8">
            Bienvenido <span class="text-(--color-primary)">{{ user()?.nombre }}</span> a PixelZone
        </h1>
    } @else {
        <div class="flex flex-col items-center mb-8">
            <h1 class="text-xl sm:text-2xl md:text-3xl lg:text-4xl font-bold text-center mb-4">
                Bienvenido a <span class="text-(--color-primary)">PixelZone</span>
            </h1>
            <div class="flex gap-4">
                <button routerLink="/auth/login" class="px-4 py-2 bg-(--color-primary) text-white rounded">Iniciar Sesión</button>
                <button routerLink="/auth/register" class="px-4 py-2 border border-(--color-primary) rounded">Registrarse</button>
            </div>
        </div>
    }
    <div class="grid grid-cols-1 md:grid-cols-2 gap-8 w-full px-4">
        @for (card of cards; track $index) {
            <app-card-games [card]="card"></app-card-games>
        }
    </div>
</section>
