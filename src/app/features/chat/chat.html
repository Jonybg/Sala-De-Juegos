<div class="  w-full h-screen flex justify-center items-center p-4">

  <div class=" card-neon w-full max-w-5xl h-[80vh] bg-zinc-900 rounded-3xl shadow-2xl border border-cyan-500/20 flex flex-col overflow-hidden">

    <div class="px-6 py-4">
      <h2 class="text-white font-bold text-xl">Chat Global</h2>
      <p class="text-zinc-400 text-sm">Conectados en tiempo real</p>
    </div>

    <div class="flex-1 overflow-y-auto p-6 space-y-4 ">

      @for (mensaje of chatService.mensajes(); track $index) {

        <div 
          class="flex"
          [class.justify-end]="mensaje.user_id === chatService.usuario()?.id"
          [class.justify-start]="mensaje.user_id !== chatService.usuario()?.id"
        >

          <div
            class="max-w-[70%] rounded-2xl px-4 py-3 shadow-lg transition-all duration-200"
            [class.bg-cyan-500]="mensaje.user_id === chatService.usuario()?.id"
            [class.text-black]="mensaje.user_id === chatService.usuario()?.id"
            [class.bg-zinc-800]="mensaje.user_id !== chatService.usuario()?.id"
            [class.text-white]="mensaje.user_id !== chatService.usuario()?.id"
          >

            <small class="block text-xs font-bold opacity-70 mb-1">
              {{ mensaje.user_id === chatService.usuario()?.id ? 'Tú' : mensaje.usuarios?.nombre }}
            </small>

            <p class="text-sm md:text-base">
              {{ mensaje.content }}
            </p>

            <small class="block text-[10px] opacity-60 mt-2 text-right">
              {{ mensaje.created_at | date:'HH:mm' }}
            </small>

          </div>

        </div>

      }

    </div>

    <div class="border-t background-color: var(--color-surface) p-4">

      <div class="flex gap-3">

        <input
          [(ngModel)]="chatService.textoMensaje"
          (keyup.enter)="enviarMensaje()"
          placeholder="Escribe un mensaje..."
          class="flex-1 card-neon rounded-xl px-4 py-3 outline-none border border-zinc-700 focus:border-cyan-400 transition"
        >

        <button
          (click)="enviarMensaje()"
          class= "card-neon font-bold px-6 rounded-xl transition-all duration-200 hover:scale-105"
        >
          Enviar
        </button>

      </div>

    </div>

  </div>

</div>
