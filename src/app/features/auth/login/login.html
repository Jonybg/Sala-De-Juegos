<section class="flex flex-col items-center justify-center min-h-3/4 w-full mx-auto mt-[4vh] px-4">
    <form (ngSubmit)="onSubmit()" [formGroup]="form" class="min-h-80 card-neon w-full sm:w-3/4 md:w-2/4 gap-6 flex flex-col justify-center items-center px-6" >
            <img class="w-3xs" src="assets/images/logo/pixelzone.png" alt="logo">
        <label for="email">Email:</label>
        <input placeholder="Gamer@pro.com" id="email" class="w-full sm:w-3/4 p-2" type="text" formControlName="email">
        @if(form.get('email')?.invalid && form.get('email')?.touched){
            <span class="text-(--color-error)">Correo Electronico Requerido</span> <br>
        }
        <label for="password">Password:</label>
        <input placeholder="*******" id="password" class="w-full sm:w-3/4 p-2" type="password" formControlName="password">
        @if(form.get('password')?.invalid && form.get('password')?.touched){
            <span class="text-(--color-error)">Contraseña Requerida</span>
        }
        <button [disabled]="form.invalid" (click)="onSubmit()" type="submit" class="btn-sesion w-full sm:w-auto">Iniciar Sesion</button>
        <div class="flex items-center justify-center w-full sm:w-3/4 my-4">
            <div class="grow h-px bg-(--color-text-secondary)"></div>
            <span class="px-4 text-(--color-text-secondary)">Acceso Rapido</span>
            <div class="grow h-px bg-(--color-text-secondary)"></div>
        </div>
        <div class="flex justify-center items-center gap-4 sm:gap-8">
            <img class="img-fast shadow-neon" src="https://i.pravatar.cc/150" />
            <img class="img-fast shadow-neon" src="https://i.pravatar.cc/150" />
            <img class="img-fast shadow-neon" src="https://i.pravatar.cc/150" />
        </div>
        <p class="mb-20 no-count text-center">¿No Tienes Cuenta? <span class="text-(--color-primary)">Registrate</span></p>
    </form>
</section>
